name: Claude Session Trigger
on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '1 9 * * *'
    - cron: '2 14 * * *'
    - cron: '3 19 * * *'
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - run: npm install -g @anthropic-ai/claude-code
      - run: claude -p "Hi"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
